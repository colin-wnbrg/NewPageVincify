    const AnimateOnScroll = ({ children, className = "" }) => {
      const [isVisible, setIsVisible] = useState(false);
      const ref = useRef(null);

      useEffect(() => {
        const observer = new IntersectionObserver(
          ([entry]) => {
            if (entry.isIntersecting) {
              setIsVisible(true);
              observer.unobserve(entry.target);
            }
          },
          {
            rootMargin: '0px',
            threshold: 0.15
          }
        );

        const currentRef = ref.current;
        if (currentRef) {
          observer.observe(currentRef);
        }

        return () => {
          if (currentRef) {
            observer.unobserve(currentRef);
          }
        };
      }, []);

      return (
        <div ref={ref} className={`reveal-on-scroll ${isVisible ? 'is-visible' : ''} ${className}`}>
          {children}
        </div>
      );
    };

                                id="name"
                                value={name}
                                onChange={(e) => setName(e.target.value)}
                                required
                                className="w-full bg-warm-white/5 border border-warm-white/10 rounded-lg py-3 px-4 text-warm-white placeholder-warm-white/30 focus:ring-2 focus:ring-emerald-500 focus:outline-none transition-all"
                                placeholder="Your Name"
                                aria-label="Name"
                            />
                        </div>
                        <div>
                            <label htmlFor="email" className="block text-sm font-medium text-warm-white/80 mb-2">Email</label>
                            <input
                                type="email"
                                id="email"
                                value={email}
                                onChange={(e) => setEmail(e.target.value)}
                                required
                                className="w-full bg-warm-white/5 border border-warm-white/10 rounded-lg py-3 px-4 text-warm-white placeholder-warm-white/30 focus:ring-2 focus:ring-emerald-500 focus:outline-none transition-all"
                                placeholder="you@example.com"
                                aria-label="Email Address"
                            />
                        </div>
                        <div>
                            <label htmlFor="message" className="block text-sm font-medium text-warm-white/80 mb-2">Message</label>
                            <textarea
                                id="message"
                                value={message}
                                onChange={(e) => setMessage(e.target.value)}
                                required
                                rows={6}
                                className="w-full bg-warm-white/5 border border-warm-white/10 rounded-lg py-3 px-4 text-warm-white placeholder-warm-white/30 focus:ring-2 focus:ring-emerald-500 focus:outline-none transition-all"
                                placeholder="How can we help you?"
                                aria-label="Your Message"
                            ></textarea>
                        </div>
                        <div>
                            <button
                                type="submit"
                                disabled={status === 'submitting'}
                                className="w-full flex items-center justify-center bg-emerald-900/40 border border-emerald-800/50 hover:bg-emerald-800/60 text-warm-white font-semibold py-3 px-6 rounded-lg transition-colors duration-300 transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-renaissance-dark focus:ring-emerald-500 disabled:opacity-50 disabled:cursor-not-allowed select-none"
                            >
                                {status === 'submitting' ? 'Submitting...' : 'Submit'}
                            </button>
                        </div>
                         {status === 'error' && (
                            <p className="text-center text-red-400 text-sm">
                                Something went wrong. Please try again.
                            </p>
                        )}
                    </form>
                  )}
                </AnimateOnScroll>
            </div>
          </main>
          <footer className="border-t border-warm-white/10 py-8 mt-auto">
              <div className="container mx-auto px-6 flex flex-col md:flex-row justify-between items-center text-warm-white/60 gap-6">
                <div className="text-sm">
                  &copy; 2025 Vincify. All rights reserved.
                </div>
                <div className="flex items-center gap-x-6 text-sm">
                  <a href="/privacypolicy" className="hover:text-warm-white transition-all duration-300 hover:-translate-y-px">Privacy Policy</a>
                  <a href="/termsandconditions" className="hover:text-warm-white transition-all duration-300 hover:-translate-y-px">Terms & Conditions</a>
                  <a href="/eula" className="hover:text-warm-white transition-all duration-300 hover:-translate-y-px">EULA</a>
                </div>
              </div>
            </footer>
        </div>
      );
    };

    const App = () => {
      const [page, setPage] = useState(() => {
        const path = window.location.pathname.replace(/\/$/, '');
        return path === '/support' ? 'support' : 'main';
      });

      return (
        <div className="bg-renaissance-gradient text-warm-white antialiased min-h-screen">
            <div className="relative overflow-hidden">
                <div className="absolute top-0 left-0 -z-10 w-full h-full pointer-events-none">
                    <div className="absolute top-[-20%] left-[-20%] w-[500px] h-[500px] bg-gradient-radial from-emerald-900/20 to-transparent blur-3xl rounded-full"></div>
                    <div className="absolute bottom-[-20%] right-[-20%] w-[500px] h-[500px] bg-gradient-radial from-amber-900/20 to-transparent blur-3xl rounded-full"></div>
                </div>
                {page === 'main' ? <MainPage setPage={setPage} /> : <SupportPage setPage={setPage} />}
            </div>
        </div>
      );
    };

    const rootElement = document.getElementById('root');
    if (!rootElement) {
      throw new Error("Could not find root element to mount to");
    }

    const root = ReactDOM.createRoot(rootElement);
    root.render(
      <React.StrictMode>
        <App />
      </React.StrictMode>
    );
  </script>
</body>
</html>
